<!doctype html>
<html lang="hu">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ELITE MOTORS - Vásárlás</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/img/car.png">
</head>

<body style="background-image: none; background-color: var(--hatter-szin-sotet)" ; id="vasarlas">
    <!-- vasarlas id a javascript miatt kell hogy lefusson a kartya generalas kod, ha nincs nem csinal kartyakat -->
    <script src="js/script.js"></script>
    <navbar-vasarlas>
        <script>includeHtml('navbar-vasarlas');</script>
    </navbar-vasarlas>

    <br><br><br>
    <!-- Keresés/filterek -->
    <div class="m-auto asd">
        <div class="card-group">
            <div class="card card-vasarlas-nev">
                Márka
                <form>
                    <div class="input-group mb-3">
                        <input type="" class="form-control" placeholder="" aria-label="" required id="markaInput">
                    </div>
                </form>
            </div>
            <div class="card card-vasarlas-nev">
                Modell
                <form>
                    <div class="input-group mb-3">
                        <input type="" class="form-control" placeholder="" aria-label="" required id="modellInput">
                    </div>
                </form>
            </div>
            <div class="card card-vasarlas-nev">
                Kivitel
                <div class="dropdown">
                    <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                        id="dropdownSzoveg" aria-expanded="false" style="width: 100%;">
                        Kérem Válasszon
                    </button>
                    <ul class="dropdown-menu" style="max-height: 300px; overflow-y: scroll;">
                        <li><a class="dropdown-item" onclick="setDropdownValue('')" href="#">Kérem Válasszon</a></li>
                        <li><a class="dropdown-item" onclick="setDropdownValue('Compact')" href="#">Compact</a></li>
                        <li><a class="dropdown-item" onclick="setDropdownValue('Coupe')" href="#">Coupe</a></li>
                        <li><a class="dropdown-item" onclick="setDropdownValue('Sedan')" href="#">Sedan</a></li>
                        <li><a class="dropdown-item" onclick="setDropdownValue('Hatchback')" href="#">Hatchback</a></li>
                        <li><a class="dropdown-item" onclick="setDropdownValue('SUV')" href="#">SUV</a></li>
                        <li><a class="dropdown-item" onclick="setDropdownValue('Van')" href="#">Van</a></li>
                    </ul>
                </div>
            </div>
            <div class="card card-vasarlas-nev">
                Keresés
                <button class="btn btn-primary" type="button" onclick="Kereses()" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    <i class="bi bi-search"></i>
                </button>
            </div>

        </div>
        <br>
    </div>

    <!-- kártyák -->
    <br><br><br>
    <div class="row row-cols-1 row-cols-md-3 g-2">
        <div class="m-auto asd card-group pb-4" id="talalatok">

        </div>
    </div>


    <br><br><br><br><br>
    <!-- auto reszletek modal -->
    <div class="modal modal-fullscreen" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content modal-szinek">
                <div class="modal-header modal-szinek-2">
                    <h1 class="modal-title fs-5"></h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <div class="card">
                                <div class="card-body">
                                    <h1 class="card-title" id="ModalTitle">Hiba történt a betöltés során!</h1>
                                    <p class="card-text" id="ModalSubtitle"></p>
                                    <div id="carouselExampleIndicators" class="carousel slide">
                                        <div class="carousel-indicators">
                                            <button type="button" data-bs-target="#carouselExampleIndicators"
                                                data-bs-slide-to="0" class="active" aria-current="true"
                                                aria-label="Slide 1"></button>
                                            <button type="button" data-bs-target="#carouselExampleIndicators"
                                                data-bs-slide-to="1" aria-label="Slide 2"></button>
                                            <button type="button" data-bs-target="#carouselExampleIndicators"
                                                data-bs-slide-to="2" aria-label="Slide 3"></button>
                                        </div>
                                        <div class="carousel-inner" id="ModalCarousel">

                                        </div>
                                        <button class="carousel-control-prev" type="button"
                                            data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                            <span class="visually-hidden">Előző</span>
                                        </button>
                                        <button class="carousel-control-next" type="button"
                                            data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                            <span class="visually-hidden">Következő</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 card-right">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title"></h5>
                                    <h6 class="card-text" id="ModalElado"></h6>
                                    <h6 class="card-text" id="ModalHelyszin"></h6>
                                    <h6 class="card-text" id="ModalUzemanyag"></h6>
                                    <br>
                                    <h5 class="card-title"></h5>
                                    <h6 class="card-text" id="ModalLeiras"></h6>
                                    <br><br>
                                    <hr>
                                    <table>
                                        <tr>
                                            <td style="padding-right: 1rem !important;">
                                                <h4 id="ModalAr"></h4>
                                            </td>
                                            <td style="padding-left: 1rem !important;"><a
                                                    href="mailto:ugyfelszolgalat@elitemotors.hu"
                                                    class="btn btn-primary">Kapcsolatfelvétel</a></td>
                                        </tr>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- eladas modal -->
    <div class="modal modal-fullscreen" id="EladasModal" tabindex="-1" aria-labelledby="EladasModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content modal-szinek">
                <div class="modal-header modal-szinek-2">
                    <h1 class="modal-title fs-5"></h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="ujAutoForm">
                        <h3>A jármű adatai</h3>
                        <br>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label for="ujCim" class="form-label">Márka *</label>
                                <input type="text" class="form-control" id="ujMarka" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="ujErtekeles" class="form-label">Modell *</label>
                                <input type="text" class="form-control" id="ujModell" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="ujEvjarat" class="form-label">Évjárat: *</label>
                                <input type="number" class="form-control" id="ujEvjarat" min="1900" max="2030" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="ujRendezo" class="form-label">Vételár (Ft-ban) *</label>
                                <input type="number" class="form-control" id="ujAr" min="0" max="111111500000" step="1"
                                    required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="ujKategoria" id="ujKivitel" class="form-label">Kivitel *</label>
                                <select class="form-select" required>
                                    <option onclick="SetEladasKategoriaValue('')">Válasszon kategóriát...</option>
                                    <option onclick="SetEladasKategoriaValue('compact')">Compact</option>
                                    <option onclick="SetEladasKategoriaValue('coupe')">Coupe</option>
                                    <option onclick="SetEladasKategoriaValue('sedan')">Sedan</option>
                                    <option onclick="SetEladasKategoriaValue('station-wagon')">Station Wagon</option>
                                    <option onclick="SetEladasKategoriaValue('suv')">SUV</option>
                                    <option onclick="SetEladasKategoriaValue('van')">Van</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="ujLeiras" class="form-label">Leírás</label>
                            <input type="text" class="form-control" id="ujLeiras">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Üzemanyag *</label>
                            <input type="text" class="form-control" id="ujUzemanyag" required>
                        </div>
                        <br><br>
                        <h3>Az ön adatai</h3>
                        <br>
                        <div class="mb-3">
                            <label class="form-label">Eladó Neve *</label>
                            <input type="text" class="form-control" id="ujElado" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Helyszín *</label>
                            <input type="text" class="form-control" id="ujHelyszin" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="ujErtekeles" class="form-label">Email cím *</label>
                                <input type="email" class="form-control" id="ujEmail" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Telefonszám: *</label>
                                <input type="number" class="form-control" required>
                            </div>
                        </div>
                        <button class="btn gomb btn-primary">
                            <span class="my-2"></span>Fizetési adatok megadása
                        </button>
                        <br><br>
                        <h3>Autóképek</h3>
                        <br>
                        <div class="mb-3">
                            <label for="ujKep" class="form-label">1. Autókép URL címe</label>
                            <input type="url" id="ujFoto1" class="form-control" placeholder="https://...">
                        </div>
                        <div class="mb-3">
                            <label for="ujKep" class="form-label">2. Autókép URL címe</label>
                            <input type="url" id="ujFoto2" class="form-control" placeholder="https://...">
                        </div>
                        <div class="mb-3">
                            <label for="ujKep" class="form-label">3. Autókép URL címe</label>
                            <input type="url" id="ujFoto3" class="form-control" placeholder="https://...">
                        </div>
                    </form>
                </div>
                <div class="m-footer m-3">
                    <button class="btn gomb btn-primary" type="submit"
                        onclick="if(AddNewCar()) ShowToast('Jármű sikeresen feltöltve!', 'A járművet mostmár megtekinthetik a vásárlók a vásárlás menüpont alatt.');"
                        id="Ujautofelvetel">
                        <span class="bi bi-send my-2"></span>Feltöltés
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- toast menü -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto toast-title"></strong>
                <small></small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">

            </div>
        </div>
    </div>

    <footer>
        <script>includeHtml('footer');</script>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
